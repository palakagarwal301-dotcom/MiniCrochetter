<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #fdf6ee;
}

header {
  padding: 15px;
  text-align: center;
  background: white;
  font-weight: bold;
  font-size: 20px;
}

.container {
  padding: 15px;
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.categories button {
  padding: 8px 12px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 8px;
  padding: 8px;
  border: none;
  background: #712b13;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}

.checkout {
  margin-top: 10px;
  width: 100%;
  background: green;
}

</style>
</head>

<body>

<header>Mini Crochetter 🧶</header>

<div class="container">

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('flower')">Flowers</button>
  <button onclick="filter('plushie')">Plushies</button>
  <button onclick="filter('decor')">Decor</button>
  <button onclick="filter('bags')">Bags</button>
  <button onclick="filter('baby')">Baby</button>
  <button onclick="filter('accessory')">Accessories</button>
</div>

<div class="products" id="products"></div>

</div>

<div class="cart">
  Cart Total: ₹<span id="total">0</span>
  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

https://mini-crochetter-j9b3.vercel.app/shop.html

</body>
</html>
