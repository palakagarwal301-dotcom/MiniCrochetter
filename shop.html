<script src="products.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  if (!window.products) {
    console.error("products.js not loaded or empty");
    return;
  }

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function updateTotal(){
    const total = cart.reduce((s,i)=>s+i.price,0);
    document.getElementById("total").innerText = total;
  }

  window.filter = function(cat){
    if(cat==="all") render(products);
    else render(products.filter(p=>p.category===cat));
  }

  function render(list){
    const container = document.getElementById("products");
    container.innerHTML = "";

    list.forEach(p=>{
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.desc}</p>
        <p><b>₹${p.price}</b></p>
        <button>Add to Cart</button>
      `;

      card.querySelector("button").onclick = ()=>{
        cart.push({...p, qty:1});
        localStorage.setItem("cart", JSON.stringify(cart));
        updateTotal();
      };

      container.appendChild(card);
    });
  }

  window.checkout = function(){
    if(cart.length===0){
      alert("Cart is empty");
      return;
    }

    let msg="🧶 Order:%0A";
    cart.forEach(i=>{
      msg += i.name + " ₹" + i.price + "%0A";
    });

    const total = cart.reduce((s,i)=>s+i.price,0);
    msg += "%0ATotal: ₹"+total;

    window.open("https://wa.me/918886122232?text="+msg);
  }

  render(products);
  updateTotal();

});
</script>
