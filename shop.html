<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #fdf6ee;
}

header {
  padding: 15px;
  text-align: center;
  background: white;
  font-weight: bold;
  font-size: 20px;
}

.container {
  padding: 15px;
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.categories button {
  padding: 8px 12px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

button {
  margin-top: 8px;
  padding: 8px;
  border: none;
  background: #712b13;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}

.checkout {
  margin-top: 10px;
  width: 100%;
  background: green;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#popup img {
  max-width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Mini Crochetter 🧶</header>

<div class="container">

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('flower')">Flowers</button>
  <button onclick="filter('plushie')">Plushies</button>
  <button onclick="filter('decor')">Decor</button>
  <button onclick="filter('bags')">Bags</button>
  <button onclick="filter('baby')">Baby</button>
  <button onclick="filter('accessory')">Accessories</button>
</div>

<div class="products" id="products"></div>

</div>

<div class="cart">
  Cart Total: ₹<span id="total">0</span>
  <button class="checkout" onclick="checkout()">Order on WhatsApp</button>
</div>

<!-- IMAGE POPUP -->
<div id="popup">
  <img id="popup-img">
</div>

<script>

/* PRODUCTS */
const products = [

  {id:1, name:"Daisy Flower", price:399, category:"flower", img:"daisy.png"},
  {id:2, name:"Sunflower", price:449, category:"flower", img:"sunflower.png"},
  {id:3, name:"Daisy Variant", price:399, category:"flower", img:"daisy_flower.png"},
  {id:4, name:"Sunflower Variant", price:449, category:"flower", img:"sunflower_flower.png"},

  {id:5, name:"Bow Headband", price:199, category:"accessory", img:"bow_headband.png"},
  {id:6, name:"Rakhi Bow", price:179, category:"accessory", img:"rakhi_bow.jpg"},
  {id:7, name:"Rakhi Set", price:399, category:"accessory", img:"rakhis_trio.jpg"},

  {id:8, name:"Mini Plushies", price:699, category:"plushie", img:"mini_plushies.png"},
  {id:9, name:"Pooh Plushie", price:899, category:"plushie", img:"pooh.png"},
  {id:10, name:"Minion Plushie", price:899, category:"plushie", img:"minion.png"},
  {id:11, name:"Shark Plushie", price:899, category:"plushie", img:"shark_plushie.png"},
  {id:12, name:"Santa Plushie", price:899, category:"plushie", img:"santa_plushie.jpg"},

  {id:13, name:"Mandala Centre Mat", price:799, category:"decor", img:"mandala_centre_mat.jpg"},
  {id:14, name:"Mandala Doily", price:699, category:"decor", img:"mandala_doily.jpg"},
  {id:15, name:"Coasters Set", price:399, category:"decor", img:"coasters_mats.png"},
  {id:16, name:"Leaf Coaster", price:249, category:"decor", img:"coaster_leaf_heart.jpg"},
  {id:17, name:"Sunflower Coaster", price:249, category:"decor", img:"sunflower-coaster.png"},

  {id:18, name:"Rose Drawstring Bag", price:1299, category:"bags", img:"bag_rose_drawstring.jpg"},
  {id:19, name:"Sunflower Sling Bag", price:1499, category:"bags", img:"bag_sunflower_sling.jpg"},

  {id:20, name:"Baby Booties Lace", price:399, category:"baby", img:"booties_lace_wood.jpg"},
  {id:21, name:"Pink Booties", price:399, category:"baby", img:"booties_pink_basket.jpg"},

  {id:22, name:"Custom Plushie", price:1299, category:"custom", img:"custom_plushie.jpg"}

];

/* CART */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}" onclick="openPopup('${p.img}')">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
  });
}

function filter(category){
  if(category === "all") return render(products);
  render(products.filter(p => p.category === category));
}

function addToCart(id){
  const item = products.find(p => p.id === id);
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateTotal();
}

function updateTotal(){
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("total").innerText = total;
}

/* POPUP */
function openPopup(img){
  document.getElementById("popup").style.display = "flex";
  document.getElementById("popup-img").src = img;
}

document.getElementById("popup").onclick = function(){
  this.style.display = "none";
}

/* CHECKOUT */
function checkout(){
  let text = "Order Details:%0A";
  cart.forEach(item => {
    text += `${item.name} - ₹${item.price}%0A`;
  });

  window.open(`https://wa.me/919830160265?text=${text}`, "_blank");
}

/* INIT */
render(products);
updateTotal();

</script>

</body>
</html>
