<style>
  nav {
  background: white;
  padding: 10px;
  text-align: center;
  margin-bottom: 10px;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}
body {
  font-family: Segoe UI, sans-serif;
  background: #fdf6ee;
}

header {
  text-align: center;
  padding: 15px;
  background: white;
  font-weight: bold;
}

.<div class="container">

  <!-- SEARCH -->
  <input type="text" id="searchBox" placeholder="Search crochet items..."
  style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">

  <!-- CATEGORIES -->
  <div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('flower')">Flowers</button>
    <button onclick="filter('plushie')">Plushies</button>
    <button onclick="filter('decor')">Decor</button>
  </div>

  <!-- PRODUCTS -->
  <div id="products" class="products"></div>
}

.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.categories button {
  padding: 8px 12px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

.card button {
  margin-top: 8px;
  padding: 8px;
  width: 100%;
  background: #712b13;
  color: white;
  border: none;
  border-radius: 6px;
}

.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  display: flex;
  justify-content: space-between;
  border-top: 1px solid #ddd;
}
</style>

</head>

<body>
  addToCart(p);
<header>
  Mini Crochetter 🧶
</header>

<div class="container">

  <div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('flower')">Flowers</button>
    <button onclick="filter('plushie')">Plushies</button>
    <button onclick="filter('decor')">Decor</button>
  </div>

  <div id="products" class="products"></div>

</div>

<div class="cart">
  <div>Total: ₹<span id="total">0</span></div>
  <button onclick="checkout()">Order</button>
</div>

<script src="products.js"></script>

<script>
  document.getElementById("searchBox").addEventListener("input", function(e){
  let value = e.target.value.toLowerCase();

  let filtered = products.filter(p =>
    p.name.toLowerCase().includes(value) ||
    p.desc.toLowerCase().includes(value)
  );

  render(filtered);
});
document.addEventListener("DOMContentLoaded", function(){

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function saveCart(){
    localStorage.setItem("cart", JSON.stringify(cart));
    updateTotal();
  }

  function updateTotal(){
    let total = cart.reduce((s,i)=>s+i.price,0);
    document.getElementById("total").innerText = total;
  }

  window.filter = function(cat){
    if(cat==="all") render(products);
    else render(products.filter(p=>p.category===cat));
  }

  function render(list){
    const container = document.getElementById("products");
    container.innerHTML = "";

    list.forEach(p=>{
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>${p.desc}</p>
        <p><b>₹${p.price}</b></p>
        <button>Add to Cart</button>
      `;

      div.querySelector("button").onclick = ()=>{
        addToCart(p);
        saveCart();
      };

      container.appendChild(div);
    });
  }

  window.checkout = function(){
    if(cart.length === 0){
      alert("Cart is empty");
      return;
    }

    let msg = "🧶 Mini Crochetter Order%0A%0A";

    cart.forEach(i=>{
      msg += i.name + " - ₹" + i.price + "%0A";
    });

    let total = cart.reduce((s,i)=>s+i.price,0);

    msg += "%0ATotal: ₹" + total;

    localStorage.setItem("cart", JSON.stringify(cart));
window.location.href = "success.html";
  }

  if(typeof products !== "undefined"){
    render(products);
  } else {
    console.error("products.js missing");
  }

  updateTotal();

});
</script>
<script>
function updateCartCount(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  
  let count = cart.reduce((sum,item)=>{
    return sum + (item.qty || 1);
  },0);

  let el = document.getElementById("cartCount");
  if(el){
    el.innerText = count;
  }
}

updateCartCount();
window.addEventListener("storage", updateCartCount);
</script>
