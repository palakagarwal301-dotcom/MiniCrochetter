<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Shop — Mini Crochetter</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Jost,system-ui,sans-serif;background:#fdf6ee;color:#3d2a1f}
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-bottom:1px solid #f0e7df;position:sticky;top:0;z-index:50}
nav .brand{display:flex;align-items:center;gap:10px;font-weight:700;color:#5b3d2b;text-decoration:none}
nav .brand .ni{width:32px;height:32px;border-radius:50%;background:#712b13;color:#fff;display:flex;align-items:center;justify-content:center}
nav .links{display:flex;gap:18px}
nav .links a{color:#5b3d2b;text-decoration:none;font-size:15px}
nav .links a:hover{color:#b87a5c}
.cart-btn{background:#712b13;color:#fff;border:none;padding:9px 16px;border-radius:22px;cursor:pointer;font-family:inherit;font-size:14px;display:inline-flex;align-items:center;gap:6px}
.cart-btn .count{background:#fff;color:#712b13;border-radius:10px;min-width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;padding:0 6px}

.shop-wrap{padding:24px 20px 60px;max-width:1200px;margin:0 auto}
.shop-head{margin-bottom:18px}
.shop-head h1{font-family:'Playfair Display',serif;margin:0 0 4px;color:#5b3d2b;font-size:30px}
.shop-head p{margin:0;color:#8a6f5e}

.tabs{display:flex;gap:8px;overflow-x:auto;margin:18px 0 14px;padding-bottom:4px}
.tab{padding:8px 16px;border:1px solid #e9dccf;border-radius:22px;background:#fff;white-space:nowrap;cursor:pointer;font-family:inherit;font-size:14px;color:#5b3d2b;transition:.15s}
.tab:hover{border-color:#d49a7a}
.tab.active{background:#712b13;color:#fff;border-color:#712b13}

.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.search{flex:1;min-width:220px;position:relative}
.search input{width:100%;padding:11px 14px 11px 38px;border:1px solid #e9dccf;border-radius:22px;font-family:inherit;font-size:14px;background:#fff;color:#3d2a1f}
.search input:focus{outline:none;border-color:#d49a7a;box-shadow:0 0 0 3px rgba(212,154,122,.15)}
.search .ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#a4886f;font-size:14px;pointer-events:none}
.sort select{padding:10px 14px;border:1px solid #e9dccf;border-radius:22px;font-family:inherit;font-size:14px;background:#fff;color:#5b3d2b;cursor:pointer}
.sort select:focus{outline:none;border-color:#d49a7a;box-shadow:0 0 0 3px rgba(212,154,122,.15)}
.result-count{font-size:13px;color:#8a6f5e;margin-bottom:12px}
.no-results{text-align:center;padding:60px 20px;color:#8a6f5e;background:#fff;border:1px dashed #e9dccf;border-radius:14px;grid-column:1/-1}
.no-results .ico{font-size:42px;margin-bottom:8px}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:640px){.products{grid-template-columns:repeat(3,1fr)}}
@media(min-width:900px){.products{grid-template-columns:repeat(4,1fr)}}

.card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid #f0e7df;display:flex;flex-direction:column;transition:.15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(180,140,110,.12)}
.card .img{aspect-ratio:1/1;background:#f3e7d7;cursor:pointer;overflow:hidden}
.card .img img{width:100%;height:100%;object-fit:cover;display:block}
.card .info{padding:12px 12px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
.card .name{font-weight:600;font-size:15px;color:#3d2a1f;line-height:1.3;cursor:pointer}
.card .price{color:#712b13;font-weight:700;font-size:16px}
.card .add{margin-top:auto;background:#fdf6f0;color:#5b3d2b;border:1px solid #e9dccf;padding:9px 12px;border-radius:10px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:.15s}
.card .add:hover{background:#712b13;color:#fff;border-color:#712b13}

.modal-bg{position:fixed;inset:0;background:rgba(60,40,28,.55);display:none;align-items:center;justify-content:center;z-index:80;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#fff;width:100%;max-width:480px;border-radius:16px;padding:20px;position:relative;max-height:90vh;overflow-y:auto}
.modal .close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#8a6f5e}
.modal img{width:100%;border-radius:12px;aspect-ratio:1/1;object-fit:cover}
.modal h3{font-family:'Playfair Display',serif;margin:14px 0 4px;color:#5b3d2b;font-size:22px}
.modal .mprice{color:#712b13;font-weight:700;font-size:18px;margin-bottom:8px}
.modal p{color:#7a5e4d;line-height:1.5;font-size:14px;margin:8px 0 14px}
.qty-row{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.qty-row label{font-size:14px;color:#5b3d2b;font-weight:500}
.qty{display:inline-flex;align-items:center;border:1px solid #e9dccf;border-radius:10px;overflow:hidden}
.qty button{background:#fdf6f0;border:none;width:34px;height:34px;cursor:pointer;font-size:16px;color:#5b3d2b}
.qty button:hover{background:#f3e3d2}
.qty input{width:44px;text-align:center;border:none;border-left:1px solid #e9dccf;border-right:1px solid #e9dccf;height:34px;font-family:inherit;font-size:14px;color:#3d2a1f;background:#fff}
.qty input::-webkit-outer-spin-button,.qty input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.qty input[type=number]{-moz-appearance:textfield}
.add-modal{width:100%;background:linear-gradient(135deg,#d49a7a,#b87a5c);color:#fff;border:none;padding:12px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;box-shadow:0 4px 14px rgba(184,122,92,.25)}
.add-modal:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(184,122,92,.35)}

.drawer-bg{position:fixed;inset:0;background:rgba(60,40,28,.5);opacity:0;pointer-events:none;transition:.2s;z-index:90}
.drawer-bg.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:100%;background:#fff;transform:translateX(100%);transition:transform .25s ease;z-index:91;display:flex;flex-direction:column}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:18px 20px;border-bottom:1px solid #f0e7df;display:flex;justify-content:space-between;align-items:center}
.drawer-head h3{margin:0;font-family:'Playfair Display',serif;color:#5b3d2b;font-size:20px}
.drawer-head .close{background:none;border:none;font-size:22px;cursor:pointer;color:#8a6f5e}
.drawer-body{flex:1;overflow-y:auto;padding:14px 20px}
.cart-empty{text-align:center;color:#8a6f5e;padding:60px 0}
.cart-empty .ico{font-size:42px;margin-bottom:8px}
.cart-item{display:grid;grid-template-columns:60px 1fr auto;gap:12px;padding:14px 0;border-bottom:1px solid #f3ebe2;align-items:center}
.cart-item .ci-img{width:60px;height:60px;border-radius:10px;background:#f3e7d7;overflow:hidden}
.cart-item .ci-img img{width:100%;height:100%;object-fit:cover;display:block}
.cart-item .ci-name{font-size:14px;font-weight:500;color:#3d2a1f;margin-bottom:4px;line-height:1.3}
.cart-item .ci-price{font-size:13px;color:#712b13;font-weight:600}
.cart-item .ci-controls{display:flex;align-items:center;gap:8px;margin-top:6px}
.cart-item .ci-controls .qty button{width:26px;height:26px;font-size:14px}
.cart-item .ci-controls .qty input{width:34px;height:26px;font-size:13px}
.cart-item .ci-remove{background:none;border:none;color:#a87654;cursor:pointer;font-size:13px;padding:4px}
.cart-item .ci-remove:hover{color:#712b13;text-decoration:underline}
.drawer-foot{border-top:1px solid #f0e7df;padding:18px 20px;background:#fdfaf6}
.totals{display:flex;justify-content:space-between;margin-bottom:12px;font-size:15px;color:#5b3d2b}
.totals.grand{font-size:18px;font-weight:700;color:#3d2a1f;margin-bottom:14px}
.totals.grand span:last-child{color:#712b13}
.checkout-btn{display:block;width:100%;text-align:center;background:linear-gradient(135deg,#d49a7a,#b87a5c);color:#fff;border:none;padding:13px;border-radius:10px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;text-decoration:none;box-shadow:0 4px 14px rgba(184,122,92,.25)}
.checkout-btn[disabled]{opacity:.5;pointer-events:none;box-shadow:none}
.checkout-btn:hover:not([disabled]){transform:translateY(-1px);box-shadow:0 6px 18px rgba(184,122,92,.35)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#3d2a1f;color:#fff;padding:11px 18px;border-radius:24px;font-size:14px;opacity:0;transition:.25s;z-index:100;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

<body>

<nav>
  <a href="index.html" class="brand"><div class="ni">🧶</div><div>Mini Crochetter</div></a>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="workshops.html">Workshops</a>
    <a href="order.html">Order</a>
  </div>
  <button class="cart-btn" onclick="openCart()">🛒 Cart <span class="count" id="cc">0</span></button>
</nav>

<div class="shop-wrap">
  <div class="shop-head">
    <h1>Shop handmade pieces</h1>
    <p>Pick what you love, add to cart, and we'll confirm the rest on WhatsApp.</p>
  </div>

  <div class="tabs">
    <button class="tab active" data-cat="all">All</button>
    <button class="tab" data-cat="booties">Booties</button>
    <button class="tab" data-cat="plushies">Plushies</button>
    <button class="tab" data-cat="bags">Bags</button>
    <button class="tab" data-cat="coasters">Coasters</button>
  </div>

  <div class="toolbar">
    <div class="search">
      <span class="ico">🔍</span>
      <input id="searchInput" type="search" placeholder="Search by name…" aria-label="Search products">
    </div>
    <div class="sort">
      <select id="sortSelect" aria-label="Sort products">
        <option value="featured">Sort: Featured</option>
        <option value="price-asc">Price: Low → High</option>
        <option value="price-desc">Price: High → Low</option>
        <option value="name-asc">Name: A → Z</option>
        <option value="newest">Newest first</option>
      </select>
    </div>
  </div>

  <div class="result-count" id="resultCount"></div>
  <div class="products" id="grid"></div>
</div>

<!-- PRODUCT MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="close" onclick="closeModal()" aria-label="Close">✕</button>
    <img id="mimg" alt="">
    <h3 id="mname"></h3>
    <div class="mprice" id="mprice"></div>
    <p id="mdesc"></p>
    <div class="qty-row">
      <label for="mqty">Quantity</label>
      <div class="qty">
        <button type="button" onclick="modalQty(-1)" aria-label="Decrease">−</button>
        <input id="mqty" type="number" min="1" value="1">
        <button type="button" onclick="modalQty(1)" aria-label="Increase">+</button>
      </div>
    </div>
    <button class="add-modal" onclick="addFromModal()">Add to Cart</button>
  </div>
</div>

<!-- CART DRAWER -->
<div class="drawer-bg" id="drawerBg" onclick="closeCart()"></div>
<aside class="drawer" id="drawer" aria-label="Cart">
  <div class="drawer-head">
    <h3>Your Cart</h3>
    <button class="close" onclick="closeCart()" aria-label="Close cart">✕</button>
  </div>
  <div class="drawer-body" id="cartBody"></div>
  <div class="drawer-foot">
    <div class="totals"><span>Items</span><span id="tItems">0</span></div>
    <div class="totals grand"><span>Subtotal</span><span id="tTotal">₹0</span></div>
    <a href="order.html" class="checkout-btn" id="checkoutBtn" disabled>Checkout →</a>
  </div>
</aside>

<div class="toast" id="toast"></div>

<script src="products.js?v=5"></script>
<script>
const CART_KEY = 'mc_cart';
const IMG_FALLBACK = 'pooh.png';
const products = window.PRODUCTS || [];
let cart = loadCart();
let currentProduct = null;

function loadCart(){
  try { return JSON.parse(localStorage.getItem(CART_KEY)) || []; }
  catch(e){ return []; }
}
function saveCart(){
  localStorage.setItem(CART_KEY, JSON.stringify(cart));
  updateCartUI();
}
function img(src){ return src || IMG_FALLBACK; }
function rupee(n){ return '₹' + n.toLocaleString('en-IN'); }

let currentCat = 'all';
let currentSearch = '';
let currentSort = 'featured';

function applyFilters(){
  let list = products.slice();
  if(currentCat !== 'all') list = list.filter(p => p.cat === currentCat);
  if(currentSearch){
    const q = currentSearch.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      (p.desc && p.desc.toLowerCase().includes(q)) ||
      p.cat.toLowerCase().includes(q)
    );
  }
  switch(currentSort){
    case 'price-asc':  list.sort((a,b) => a.price - b.price); break;
    case 'price-desc': list.sort((a,b) => b.price - a.price); break;
    case 'name-asc':   list.sort((a,b) => a.name.localeCompare(b.name)); break;
    case 'newest':     list.sort((a,b) => b.id - a.id); break;
  }
  render(list);
}

function render(list){
  const grid = document.getElementById('grid');
  const count = document.getElementById('resultCount');
  count.innerText = list.length === products.length
    ? `${list.length} products`
    : `${list.length} of ${products.length} products`;
  if(list.length === 0){
    grid.innerHTML = `<div class="no-results"><div class="ico">🧶</div>Nothing matched your search.<br><span style="font-size:13px">Try a different word or category.</span></div>`;
    return;
  }
  grid.innerHTML = list.map(p => `
    <div class="card">
      <div class="img" onclick="openProduct(${p.id})"><img src="${img(p.imgs[0])}" alt="${p.name}"></div>
      <div class="info">
        <div class="name" onclick="openProduct(${p.id})">${p.name}</div>
        <div class="price">${rupee(p.price)}</div>
        <button class="add" onclick="addToCart(${p.id},1)">+ Add to cart</button>
      </div>
    </div>
  `).join('');
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    currentCat = t.dataset.cat;
    applyFilters();
  });
});

let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentSearch = e.target.value.trim();
    applyFilters();
  }, 120);
});

document.getElementById('sortSelect').addEventListener('change', e => {
  currentSort = e.target.value;
  applyFilters();
});

function openProduct(id){
  const p = products.find(x => x.id === id);
  if(!p) return;
  currentProduct = p;
  document.getElementById('mimg').src = img(p.imgs[0]);
  document.getElementById('mimg').alt = p.name;
  document.getElementById('mname').innerText = p.name;
  document.getElementById('mprice').innerText = rupee(p.price);
  document.getElementById('mdesc').innerText = p.desc || '';
  document.getElementById('mqty').value = 1;
  document.getElementById('modalBg').classList.add('open');
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', e => {
  if(e.target.id === 'modalBg') closeModal();
});
function modalQty(delta){
  const el = document.getElementById('mqty');
  el.value = Math.max(1, (parseInt(el.value,10) || 1) + delta);
}
function addFromModal(){
  const qty = Math.max(1, parseInt(document.getElementById('mqty').value,10) || 1);
  addToCart(currentProduct.id, qty);
  closeModal();
}

function addToCart(id, qty){
  const p = products.find(x => x.id === id);
  if(!p) return;
  const existing = cart.find(i => i.id === id);
  if(existing) existing.qty += qty;
  else cart.push({ id:p.id, name:p.name, price:p.price, img:p.imgs[0], qty });
  saveCart();
  showToast(`Added ${qty} × ${p.name}`);
}
function changeQty(id, delta){
  const it = cart.find(i => i.id === id);
  if(!it) return;
  it.qty = Math.max(1, it.qty + delta);
  saveCart();
}
function setQty(id, val){
  const it = cart.find(i => i.id === id);
  if(!it) return;
  it.qty = Math.max(1, parseInt(val,10) || 1);
  saveCart();
}
function removeItem(id){
  cart = cart.filter(i => i.id !== id);
  saveCart();
}

function updateCartUI(){
  const count = cart.reduce((s,i) => s + i.qty, 0);
  const total = cart.reduce((s,i) => s + i.qty * i.price, 0);
  document.getElementById('cc').innerText = count;
  document.getElementById('tItems').innerText = count;
  document.getElementById('tTotal').innerText = rupee(total);
  const checkout = document.getElementById('checkoutBtn');
  if(cart.length === 0) checkout.setAttribute('disabled','');
  else checkout.removeAttribute('disabled');

  const body = document.getElementById('cartBody');
  if(cart.length === 0){
    body.innerHTML = `<div class="cart-empty"><div class="ico">🧺</div>Your cart is empty<br><span style="font-size:13px">Add something cute from the shop.</span></div>`;
    return;
  }
  body.innerHTML = cart.map(i => `
    <div class="cart-item">
      <div class="ci-img"><img src="${img(i.img)}" alt="${i.name}"></div>
      <div>
        <div class="ci-name">${i.name}</div>
        <div class="ci-price">${rupee(i.price)} each</div>
        <div class="ci-controls">
          <div class="qty">
            <button type="button" onclick="changeQty(${i.id},-1)">−</button>
            <input type="number" min="1" value="${i.qty}" onchange="setQty(${i.id}, this.value)">
            <button type="button" onclick="changeQty(${i.id},1)">+</button>
          </div>
          <button class="ci-remove" onclick="removeItem(${i.id})">Remove</button>
        </div>
      </div>
      <div style="font-weight:600;color:#3d2a1f">${rupee(i.qty * i.price)}</div>
    </div>
  `).join('');
}

function openCart(){
  document.getElementById('drawerBg').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeCart(){
  document.getElementById('drawerBg').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

applyFilters();
updateCartUI();
</script>

</body>
</html>
