<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>

<style>
body { margin:0; font-family:Segoe UI; background:#fdf6ee; }

header {
  text-align:center;
  padding:15px;
  background:white;
  font-weight:bold;
  font-size:20px;
}

.container { padding:15px; }

.categories {
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:15px;
}

.categories button {
  padding:8px 12px;
  border:none;
  background:#eee;
  border-radius:20px;
  cursor:pointer;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

.card p {
  margin:4px 0;
  font-size:13px;
  color:#555;
}

button {
  margin-top:8px;
  padding:8px;
  border:none;
  background:#712b13;
  color:white;
  border-radius:5px;
}

.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#popup img {
  max-width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Mini Crochetter 🧶</header>

<div class="container">

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('flower')">Flowers</button>
  <button onclick="filter('plushie')">Plushies</button>
  <button onclick="filter('decor')">Decor</button>
  <button onclick="filter('bags')">Bags</button>
</div>

<div id="products" class="products"></div>

</div>

<div class="cart">
  ₹<span id="total">0</span>
  <button onclick="checkout()">Order</button>
</div>

<div id="popup">
  <img id="popup-img">
</div>

<script src="products.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <p><b>₹${p.price}</b></p>
      <button>Add to Cart</button>
    `;

    card.querySelector("img").onclick = ()=>{
      document.getElementById("popup").style.display="flex";
      document.getElementById("popup-img").src = p.img;
    };

    card.querySelector("button").onclick = ()=>{
      cart.push(p);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateTotal();
    };

    container.appendChild(card);
  });
}

function updateTotal(){
  const total = cart.reduce((s,i)=>s+i.price,0);
  document.getElementById("total").innerText = total;
}

window.filter = function(cat){
  if(cat==="all") render(products);
  else render(products.filter(p=>p.category===cat));
}

window.checkout = function(){
  let msg="Order:%0A";
  cart.forEach(i=> msg += i.name+" ₹"+i.price+"%0A");
  window.open("https://wa.me/919830160265?text="+msg);
}

render(products);
updateTotal();

document.getElementById("popup").onclick = ()=>{
  document.getElementById("popup").style.display="none";
};

});
</script>

</body>
</html>
