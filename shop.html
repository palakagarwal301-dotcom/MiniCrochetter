<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Shop — Mini Crochetter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css?v=5"> </head>
<body>

<nav>
  <a href="index.html" class="nl"><div class="ni">🧶</div><div class="nt">Mini Crochetter</div></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="shop.html" class="active">Shop</a></li>
    <li><a href="workshops.html">Workshops</a></li>
    <li><a href="https://minicrochetter.substack.com" target="_blank">Newsletter</a></li>
  </ul>
  <button class="cart-btn" onclick="openCart()">🛒 Cart <span class="cart-count" id="cc">0</span></button>
</nav>

<div class="page-header">
  <h1>Our <em>Handmade</em> Collection</h1>
  <p>Handcrafted stitch by stitch in Kolkata. Shipping pan-India.</p>
</div>

<div class="shop-wrap">
  <div class="filter-tabs">
    <button class="tab active" onclick="filterP('all',this)">All</button>
    <button class="tab" onclick="filterP('booties',this)">Booties</button>
    <button class="tab" onclick="filterP('plushies',this)">Plushies</button>
    <button class="tab" onclick="filterP('coasters',this)">Coasters & Mats</button>
    <button class="tab" onclick="filterP('flowers',this)">Flowers</button>
    <button class="tab" onclick="filterP('bags',this)">Bags</button>
    <button class="tab" onclick="filterP('accessories',this)">Accessories</button>
    <button class="tab" onclick="filterP('rakhis',this)">Rakhis</button>
  </div>
  <div class="products" id="pg"></div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-head"><h3>Your Cart 🧶</h3><button class="close-c" onclick="closeCart()">✕</button></div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-foot" id="cart-foot" style="display:none">
    <div class="cart-total-row"><span>Total</span><span id="ct">₹0</span></div>
    <button class="checkout-btn" onclick="checkout()">Order via WhatsApp →</button>
    <p style="font-size:11px; text-align:center; margin-top:10px; color:var(--tm);">*Handmade items: No returns or refunds.</p>
  </div>
</div>

<div class="modal-overlay" id="mo" onclick="closeModal()"></div>
<div class="modal" id="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <div class="modal-body">
    <div class="modal-gallery"><img id="mimg" src="" alt=""></div>
    <div class="modal-info">
      <div class="modal-cat" id="mcat"></div>
      <div class="modal-name" id="mname"></div>
      <div class="modal-price" id="mprice"></div>
      <p id="mdesc" style="margin:15px 0; font-size:14px; line-height:1.6;"></p>
      <div class="modal-actions">
        <button class="modal-add" onclick="addFromModal()">Add to Cart</button>
        <button class="modal-wa" onclick="orderViaWa()">WhatsApp Inquiry</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  // BOOTIES
  {id:1, cat:"booties", name:"Pink Ruffle Booties Set", imgs:["booties_pink_basket.jpg"], price:899, desc:"Soft pink booties with white ruffles and matching headband."},
  {id:2, cat:"booties", name:"Classic Lace-Up Booties", imgs:["booties_lace_wood.jpg"], price:749, desc:"Clean, classic cream booties with brown ties."},

  // PLUSHIES
  {id:3, cat:"plushies", name:"Winnie the Pooh Plushie", imgs:["pooh.png"], price:2499, desc:"Velvet yarn Pooh, incredibly soft and technical."},
  {id:4, cat:"plushies", name:"Minion Plushie (Stuart)", imgs:["minion.png"], price:2199, desc:"Detailed Stuart with denim overalls in velvet yarn."},
  {id:5, cat:"plushies", name:"Santa Plushie", imgs:["santa_plushie.jpg"], price:2499, desc:"Festive Santa in premium velvet yarn."},
  {id:6, cat:"plushies", name:"Shark Plushie", imgs:["shark_plushie.png"], price:1799, desc:"Chubby shark with hand-stitched details."},
  {id:7, cat:"plushies", name:"Mini Plushies Trio", imgs:["mini_plushies.png"], price:749, desc:"Set of three: Bunny, Bear, and Chick."},
  {id:8, cat:"plushies", name:"Custom Character Doll", imgs:["custom_plushie.jpg"], price:1499, desc:"Handmade doll based on your specific character reference."},

  // COASTERS & MATS
  {id:9, cat:"coasters", name:"Sunflower Coaster", imgs:["sunflower-coaster.png"], price:449, desc:"Vibrant sunflower design for your table."},
  {id:10, cat:"coasters", name:"Mandala Table Mat", imgs:["mandala_centre_mat.jpg"], price:1499, desc:"14-17 inch technical centerpiece mat."},
  {id:11, cat:"coasters", name:"Leaf & Heart Coasters", imgs:["coaster_leaf_heart.jpg"], price:399, desc:"Aesthetic monstera leaf and pink heart set."},

  // FLOWERS
  {id:12, cat:"flowers", name:"Technical Daisy Bloom", imgs:["daisy_flower.png"], price:349, desc:"3D textured daisy with golden center."},
  {id:13, cat:"flowers", name:"Sunflower Wall Decor", imgs:["sunflower.png"], price:549, desc:"Large golden sunflower for home or studio walls."},

  // BAGS
  {id:14, cat:"bags", name:"Rose Drawstring Bag", imgs:["bag_rose_drawstring.jpg"], price:1699, desc:"Elegant cream bag with technical rose appliqué."},
  {id:15, cat:"bags", name:"Sunflower Sling Bag", imgs:["bag_sunflower_sling.jpg"], price:1999, desc:"Boho round sling with a full sunflower front."},

  // ACCESSORIES
  {id:16, cat:"accessories", name:"Pink Bow Headband", imgs:["bow_headband.png"], price:349, desc:"Soft stretchy headband with a bold pink bow."},
  {id:18, cat:"accessories", name:"Daisy Wristlet Keychain", imgs:["daisy.png"], price:299, desc:"Technical daisy charm on a handmade wristlet strap."},

  // RAKHIS
  {id:17, cat:"rakhis", name:"Custom Rakhi Set", imgs:["rakhis_overview.jpg"], price:249, desc:"Personalized handmade rakhis for your loved ones."}
];

let cart = [];
let currentProduct = null;

function setImg(img, src) {
  img.src = src;
  img.onerror = () => { if(!img.src.includes('images/')) img.src = 'images/' + src; };
}

function renderProducts(filter) {
  const g = document.getElementById("pg");
  const filtered = filter === 'all' ? products : products.filter(p => p.cat === filter);
  g.innerHTML = filtered.map(p => `
    <div class="product-card" onclick="openProduct(${p.id})">
      <div class="product-img-wrap"><img src="${p.imgs[0]}" alt="${p.name}"></div>
      <div class="product-info">
        <div class="product-cat">${p.cat.toUpperCase()}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price">₹${p.price}</div>
      </div>
    </div>`).join("");
  g.querySelectorAll("img").forEach(img => setImg(img, img.getAttribute('src')));
}

function openProduct(id) {
  const p = products.find(x => x.id === id);
  if(!p) return;
  currentProduct = p;
  document.getElementById("mcat").innerText = p.cat.toUpperCase();
  document.getElementById("mname").innerText = p.name;
  document.getElementById("mprice").innerText = "₹" + p.price;
  document.getElementById("mdesc").innerText = p.desc;
  setImg(document.getElementById("mimg"), p.imgs[0]);
  document.getElementById("mo").classList.add("open");
  document.getElementById("modal").classList.add("open");
}

function filterP(cat, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderProducts(cat);
}

function addFromModal() {
  if(!currentProduct) return;
  const ex = cart.find(x => x.id === currentProduct.id);
  if(ex) ex.qty++; else cart.push({...currentProduct, qty:1});
  document.getElementById("cc").innerText = cart.reduce((s,i) => s + i.qty, 0);
  showToast("Added to cart! 🧶");
}

function orderViaWa() {
  if(!currentProduct) return;
  window.open(`https://wa.me/918886122232?text=Hi! I'm interested in ${currentProduct.name}`, "_blank");
}

function closeModal() {
  document.getElementById("mo").classList.remove("open");
  document.getElementById("modal").classList.remove("open");
}

function openCart() {
  const items = document.getElementById("cart-items");
  if(cart.length === 0) {
    items.innerHTML = "<p style='text-align:center; padding:20px;'>Your cart is empty.</p>";
    document.getElementById("cart-foot").style.display = "none";
  } else {
    items.innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px;"><span>${i.name} (x${i.qty})</span><span>₹${i.price * i.qty}</span></div>`).join("");
    document.getElementById("ct").innerText = "₹" + cart.reduce((s,i) => s + (i.price * i.qty), 0);
    document.getElementById("cart-foot").style.display = "block";
  }
  document.getElementById("cart-overlay").classList.add("open");
  document.getElementById("cart-drawer").classList.add("open");
}

function closeCart() {
  document.getElementById("cart-overlay").classList.remove("open");
  document.getElementById("cart-drawer").classList.remove("open");
}

function checkout() {
  const msg = encodeURIComponent(`Hi! I'd like to order items worth ₹${document.getElementById("ct").innerText}.`);
  window.open(`https://wa.me/918886122232?text=${msg}`, "_blank");
}

function showToast(m) {
  const t = document.getElementById("toast");
  t.innerText = m; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

renderProducts('all');
</script>
</body>
</html>
