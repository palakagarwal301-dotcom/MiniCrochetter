<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop | mini.crochetter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F9F6F0; color: #4A4238; }
        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }
        .badge { background-color: #E5D3B3; color: #4A4238; font-size: 9px; padding: 2px 8px; letter-spacing: 0.1em; }
    </style>
</head>
<body>

    <nav class="flex justify-between items-center px-8 py-6 bg-white/50 backdrop-blur-md sticky top-0 z-50 border-b border-stone-100">
        <a href="index.html" class="text-xl tracking-[0.2em] lowercase serif">mini.crochetter</a>
        <div class="flex space-x-6 text-[10px] uppercase tracking-widest">
            <a href="index.html">Home</a>
            <a href="shop.html" class="font-bold border-b border-stone-800">Shop</a>
            <a href="workshops.html">Workshops</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-12">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16">
            
            <div class="group">
                <div class="relative bg-white aspect-[4/5] flex items-center justify-center p-8 mb-4 overflow-hidden shadow-sm">
                    <img src="./mandala-centerpiece.png" alt="Mandala" class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110">
                    <button class="absolute bottom-0 left-0 w-full bg-stone-800 text-white py-4 text-[9px] uppercase tracking-[0.3em] opacity-0 group-hover:opacity-100 transition-all">Add to Cart</button>
                </div>
                <h3 class="serif italic text-lg lowercase">Spring Mandala Centerpiece</h3>
                <p class="text-sm font-light text-stone-600">₹1,850</p>
            </div>

            <div class="group">
                <div class="relative bg-white aspect-[4/5] flex items-center justify-center p-8 mb-4 overflow-hidden shadow-sm">
                    <img src="./sunflower-coaster.png" alt="Sunflower" class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110">
                    <button class="absolute bottom-0 left-0 w-full bg-stone-800 text-white py-4 text-[9px] uppercase tracking-[0.3em] opacity-0 group-hover:opacity-100 transition-all">Add to Cart</button>
                </div>
                <h3 class="serif italic text-lg lowercase">Sunflower Petal Coaster</h3>
                <p class="text-sm font-light text-stone-600">₹1,299</p>
            </div>

            <div class="group">
                <div class="relative bg-white aspect-[4/5] flex items-center justify-center p-8 mb-4 overflow-hidden shadow-sm">
                    <img src="./minion.png" alt="Minion" class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110">
                    <button class="absolute bottom-0 left-0 w-full bg-stone-800 text-white py-4 text-[9px] uppercase tracking-[0.3em] opacity-0 group-hover:opacity-100 transition-all">Add to Cart</button>
                </div>
                <h3 class="serif italic text-lg lowercase">The Minion Friend</h3>
                <p class="text-sm font-light text-stone-600">₹950</p>
            </div>

            <div class="group">
                <div class="relative bg-white aspect-[4/5] flex items-center justify-center p-8 mb-4 overflow-hidden shadow-sm">
                    <img src="./pooh.png" alt="Pooh" class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110">
                    <button class="absolute bottom-0 left-0 w-full bg-stone-800 text-white py-4 text-[9px] uppercase tracking-[0.3em] opacity-0 group-hover:opacity-100 transition-all">Add to Cart</button>
                </div>
                <h3 class="serif italic text-lg lowercase">Classic Pooh Bear</h3>
                <p class="text-sm font-light text-stone-600">₹1,100</p>
            </div>

        </div>
    </main>

    <footer class="text-center py-12 text-[9px] uppercase tracking-[0.3em] text-stone-400">
        &copy; 2026 mini.crochetter | Rowland Road, Kolkata
    </footer>

</body>
</html>
