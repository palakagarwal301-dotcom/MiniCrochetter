<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Shop — Mini Crochetter</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Jost;background:#fdf6ee}
nav{display:flex;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #eee}

.shop-wrap{padding:16px}

.tabs{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.tab{padding:8px 14px;border:1px solid #ddd;border-radius:20px;background:#fff;white-space:nowrap;cursor:pointer}
.tab.active{background:#712b13;color:#fff;border-color:#712b13}

.products{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:768px){.products{grid-template-columns:repeat(4,1fr)}}

.card{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #eee;cursor:pointer}
.img{height:160px;background:#f3e7d7}
.img img{width:100%;height:100%;object-fit:cover}

.info{padding:10px}
.name{font-weight:600}
.price{color:#712b13;font-weight:700}

.wish{position:absolute;top:8px;right:8px;background:#fff;border:none;border-radius:50%;width:28px;height:28px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center}
.modal{background:#fff;width:90%;max-width:500px;border-radius:12px;padding:16px}
.modal img{width:100%;border-radius:10px}
.close{float:right;cursor:pointer}

.cart{position:fixed;right:10px;top:10px;background:#712b13;color:#fff;padding:8px 12px;border-radius:20px;cursor:pointer}
</style>
</head>

<body>

<nav>
  <div>🧶 Mini Crochetter</div>
  <div class="cart" onclick="openCart()">Cart (<span id="cc">0</span>)</div>
</nav>

<div class="shop-wrap">

<div class="tabs">
  <button class="tab active" onclick="filterCat('all',this)">All</button>
  <button class="tab" onclick="filterCat('booties',this)">Booties</button>
  <button class="tab" onclick="filterCat('plushies',this)">Plushies</button>
  <button class="tab" onclick="filterCat('bags',this)">Bags</button>
  <button class="tab" onclick="filterCat('coasters',this)">Coasters</button>
</div>

<div class="products" id="grid"></div>

</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal">
    <span class="close" onclick="closeModal()">✕</span>
    <img id="mimg">
    <h3 id="mname"></h3>
    <p id="mdesc"></p>
    <button onclick="addFromModal()">Add to Cart</button>
  </div>
</div>

<script>

/* ---------------- DATA ---------------- */

const products = [
  {id:1,cat:"booties",name:"Pink Booties",price:649,imgs:["booties_ruffle.jpg"],desc:"Soft handmade booties"},
  {id:2,cat:"plushies",name:"Pooh Plushie",price:1499,imgs:["pooh.png"],desc:"Cute Pooh plush"},
  {id:3,cat:"bags",name:"Rose Bag",price:999,imgs:["bag_rose.jpg"],desc:"Crochet sling bag"}
];

/* ---------------- CART ---------------- */

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let current=null;

function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

function updateCart(){
  document.getElementById("cc").innerText =
  cart.reduce((s,i)=>s+i.qty,0);
  saveCart();
}

function addToCart(id){
  let p = products.find(x=>x.id===id);
  let ex = cart.find(x=>x.id===id);

  if(ex) ex.qty++;
  else cart.push({...p,qty:1});

  updateCart();
}

/* ---------------- RENDER ---------------- */

function render(list){
  const g=document.getElementById("grid");

  g.innerHTML = list.map(p=>`
    <div class="card" onclick="openProduct(${p.id})">
      <div class="img">
        <img src="${p.imgs[0]}" onerror="this.style.display='none'">
      </div>

      <div class="info">
        <div class="name">${p.name}</div>
        <div class="price">₹${p.price}</div>
      </div>

      <button class="wish" onclick="wish(event,this)">🤍</button>
    </div>
  `).join("");
}

/* ---------------- FILTER ---------------- */

function filterCat(cat,btn){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");

  const list = cat==="all"?products:products.filter(p=>p.cat===cat);
  render(list);
}

/* ---------------- MODAL ---------------- */

function openProduct(id){
  current = products.find(p=>p.id===id);

  document.getElementById("mimg").src=current.imgs[0];
  document.getElementById("mname").innerText=current.name;
  document.getElementById("mdesc").innerText=current.desc;

  document.getElementById("modalBg").style.display="flex";
}

function closeModal(e){
  if(e && e.target.id!=="modalBg") return;
  document.getElementById("modalBg").style.display="none";
}

function addFromModal(){
  addToCart(current.id);
  closeModal();
}

/* ---------------- WISHLIST ---------------- */

function wish(e,btn){
  e.stopPropagation();
  btn.textContent = btn.textContent==="🤍"?"❤️":"🤍";
}

/* ---------------- CART ---------------- */

function openCart(){
  alert("Cart:\n\n"+cart.map(i=>i.name+" x"+i.qty).join("\n"));
}

/* ---------------- WHATSAPP ---------------- */

function checkout(){
  const msg = encodeURIComponent(
`Hi Mini Crochetter 🧶

Order:
${cart.map(i=>`• ${i.name} x${i.qty}`).join("\n")}

Thank you!`
  );

  window.open("https://wa.me/918886122232?text="+msg);
}

/* INIT */
render(products);
updateCart();

</script>

</body>
</html>
