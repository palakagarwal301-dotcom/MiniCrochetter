<body>

<nav class="navbar">
  <div class="logo">Mini Crochetter 🧶</div>
  <div class="links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart 🛒 (<span id="cartCount">0</span>)</a>
  </div>
</nav>

<div class="container">

  <input type="text" id="searchBox" placeholder="Search products..."
  style="width:100%;padding:10px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">

  <div class="categories">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('flower')">Flowers</button>
    <button onclick="filter('plushie')">Plushies</button>
    <button onclick="filter('decor')">Decor</button>
  </div>

  <div id="products" class="products"></div>

</div>

<div class="cart">
  Total: ₹<span id="total">0</span>
  <button onclick="checkout()">Order</button>
</div>

<script src="products.js"></script>
<script src="app.js"></script>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function saveCart(){
  localStorage.setItem("cart", JSON.stringify(cart));
  updateTotal();
  updateCartCount();
}

function updateTotal(){
  let total = cart.reduce((s,i)=>s+i.price*(i.qty||1),0);
  document.getElementById("total").innerText = total;
}

function render(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <p><b>₹${p.price}</b></p>
      <button>Add to Cart</button>
    `;

    div.querySelector("button").onclick = ()=>{
      cart.push({...p, qty:1});
      saveCart();
    };

    container.appendChild(div);
  });
}

window.filter = function(cat){
  if(cat==="all") render(products);
  else render(products.filter(p=>p.category===cat));
};

function checkout(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "success.html";
}

/* search */
document.getElementById("searchBox").addEventListener("input", e=>{
  let v = e.target.value.toLowerCase();
  render(products.filter(p =>
    p.name.toLowerCase().includes(v) ||
    p.desc.toLowerCase().includes(v)
  ));
});

/* init */
if(typeof products !== "undefined"){
  render(products);
}

updateTotal();
updateCartCount();
</script>

</body>
