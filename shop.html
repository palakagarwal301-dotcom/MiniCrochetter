<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #fdf6ee;
}

header {
  padding: 15px;
  text-align: center;
  background: white;
  font-weight: bold;
  font-size: 20px;
}

.container {
  padding: 15px;
}

/* Categories */
.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.categories button {
  padding: 8px 12px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}

/* Products */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
}

button {
  margin-top: 8px;
  padding: 8px;
  border: none;
  background: #712b13;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}

.checkout {
  margin-top: 10px;
  width: 100%;
  background: green;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

#popup img {
  max-width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Mini Crochetter 🧶</header>

<div class="container">

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('flower')">Flowers</button>
  <button onclick="filter('plushie')">Plushies</button>
  <button onclick="filter('decor')">Decor</button>
  <button onclick="filter('bags')">Bags</button>
  <button onclick="filter('baby')">Baby</button>
  <button onclick="filter('accessory')">Accessories</button>
</div>

<div class="products" id="products"></div>

</div>

<div class="cart">
  Cart Total: ₹<span id="total">0</span>
  <button class="checkout" onclick="checkout()">Order on WhatsApp</button>
</div>

<!-- IMAGE POPUP -->
<div id="popup">
  <img id="popup-img">
</div>

<script>

document.addEventListener("DOMContentLoaded", function () {

const products = [
  {id:1, name:"Daisy Flower", price:399, category:"flower", img:"daisy.png"},
  {id:2, name:"Sunflower", price:449, category:"flower", img:"sunflower.png"},
  {id:3, name:"Pooh Plushie", price:899, category:"plushie", img:"pooh.png"},
  {id:4, name:"Minion Plushie", price:899, category:"plushie", img:"minion.png"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(list){
  const container = document.getElementById("products");

  if (!container) {
    console.error("Products container not found");
    return;
  }

  container.innerHTML = "";

  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <button>Add to Cart</button>
    `;

    card.querySelector("button").addEventListener("click", () => {
      cart.push(p);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateTotal();
    });

    container.appendChild(card);
  });
}

function updateTotal(){
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("total").innerText = total;
}

window.filter = function(category){
  if(category === "all") render(products);
  else render(products.filter(p => p.category === category));
}

render(products);
updateTotal();

});

</script>

</body>
</html>
