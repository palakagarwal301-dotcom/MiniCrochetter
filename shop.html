<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #fdf6ee;
}

header {
  padding: 15px;
  text-align: center;
  background: #fff;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin-bottom: 15px;
}

.categories button {
  padding: 8px 12px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: white;
  border-radius: 10px;
  padding: 10px;
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 8px;
  padding: 8px;
  border: none;
  background: #712b13;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

/* Cart */
.cart {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ddd;
}

</style>
</head>

<body>

<header>Mini Crochetter 🧶</header>

<div class="container">

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('flower')">Flowers</button>
  <button onclick="filter('keychain')">Keychains</button>
</div>

<div class="products" id="products"></div>

</div>

<div class="cart">
  Cart: ₹<span id="total">0</span>
</div>

<script>

const products = [
  {id:1, name:"Daisy", price:199, category:"flower", img:"https://via.placeholder.com/200"},
  {id:2, name:"Rose", price:249, category:"flower", img:"https://via.placeholder.com/200"},
  {id:3, name:"Heart Keychain", price:149, category:"keychain", img:"https://via.placeholder.com/200"},
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="addToCart(${p.id})">Add to Cart</button>
      </div>
    `;
  });
}

function filter(category){
  if(category === "all") return render(products);
  render(products.filter(p => p.category === category));
}

function addToCart(id){
  const item = products.find(p => p.id === id);
  cart.push(item);
  localStorage.setItem("cart", JSON.stringify(cart));
  updateTotal();
}

function updateTotal(){
  const total = cart.reduce((sum, item) => sum + item.price, 0);
  document.getElementById("total").innerText = total;
}

render(products);
updateTotal();

</script>

</body>
</html>
