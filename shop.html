<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header style="text-align:center;padding:15px;background:#fff;font-weight:bold;">
🧶 Mini Crochetter Shop
</header>

<div class="tabs" style="text-align:center;margin:10px;">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('booties')">Booties</button>
  <button onclick="filter('plushies')">Plushies</button>
  <button onclick="filter('coasters')">Coasters</button>
</div>

<div id="products" style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;padding:10px;"></div>

<div style="position:fixed;bottom:0;left:0;right:0;background:#fff;padding:10px;text-align:center;">
Total: ₹<span id="total">0</span>
<button onclick="checkout()">Order</button>
</div>

<script src="products.js"></script>

<script>
let cart = [];
let currentFilter = "all";

function render(){
  const box = document.getElementById("products");
  box.innerHTML = "";

  let list = currentFilter === "all"
    ? products
    : products.filter(p => p.cat === currentFilter);

  list.forEach(p => {
    box.innerHTML += `
      <div style="width:160px;border:1px solid #ddd;padding:10px;border-radius:10px;text-align:center;">
        <img src="${p.img}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;">
        <h4>${p.name}</h4>
        <p>₹${p.price}</p>
        <button onclick="add(${p.id})">Add</button>
      </div>
    `;
  });
}

function add(id){
  const item = products.find(p => p.id === id);
  cart.push(item);
  update();
}

function update(){
  document.getElementById("total").innerText =
    cart.reduce((s,i)=>s+i.price,0);
}

function filter(cat){
  currentFilter = cat;
  render();
}

function checkout(){
  if(cart.length === 0){
    alert("Cart empty");
    return;
  }

  let msg = "Order:%0A";
  cart.forEach(i => {
    msg += i.name + " - ₹" + i.price + "%0A";
  });

  window.open("https://wa.me/919999999999?text=" + encodeURIComponent(msg));
}

render();
</script>

</body>
</html>
