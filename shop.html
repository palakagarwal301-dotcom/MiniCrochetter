<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Crochetter — Shop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nl"><div class="ni">🧶</div><div class="nt">Mini Crochetter</div></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="shop.html" class="active">Shop</a></li>
      <li><a href="workshops.html">Workshops</a></li>
      <li><a href="#contact">Order</a></li>
    </ul>
    <button class="cart-btn" onclick="openCart()">🛒 Cart <span class="cart-count" id="cc">0</span></button>
  </nav>

  <!-- PAGE HEADER -->
  <header class="page-header">
    <h1>Our <em>Shop</em></h1>
    <p>Browse handmade crochet booties, plushies, coasters, flowers & more.</p>
  </header>

  <!-- PRODUCTS GRID -->
  <section class="shop-wrap">
    <div class="filter-tabs">
      <button class="tab active">All</button>
      <button class="tab">Booties</button>
      <button class="tab">Plushies</button>
      <button class="tab">Coasters</button>
      <button class="tab">Flowers</button>
    </div>
    <div class="products">
      <!-- Example product card -->
      <div class="product-card">
        <div class="product-img-wrap">
          <img src="santa_plushie.jpg" alt="Santa Plushie">
          <span class="badge seasonal">Seasonal</span>
        </div>
        <div class="product-info">
          <div class="product-cat">Plushie</div>
          <div class="product-name">Santa Plushie</div>
          <div class="product-desc-short">Festive crochet Santa doll, handmade with love.</div>
          <div class="product-footer">
            <div class="product-price">₹499 <span>per piece</span></div>
            <button class="view-btn">View</button>
          </div>
        </div>
      </div>
      <!-- Repeat for other products -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer>…same as index.html…</footer>

  <!-- CART + TOAST -->
  <div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cart-drawer">…</div>
  <div class="toast" id="toast"></div>

  <script>…cart functions…</script>

</html>
