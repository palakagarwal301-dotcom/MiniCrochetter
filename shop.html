<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
🧶 Mini Crochetter Shop
</header>

<div class="topbar">
  <div class="tabs">
    <button onclick="filter('all')">All</button>
    <button onclick="filter('booties')">Booties</button>
    <button onclick="filter('plushies')">Plushies</button>
    <button onclick="filter('coasters')">Coasters</button>
  </div>

  <div class="cart">
    🛒 <span id="count">0</span>
  </div>
</div>

<div id="grid" class="grid"></div>

<div class="footer">
Total: ₹<span id="total">0</span>
<button onclick="checkout()">Order on WhatsApp</button>
</div>

<script src="products.js"></script>

<script>
let cart = [];
let current = "all";

function render(){
  const grid = document.getElementById("grid");
  if(!grid || !products) return;

  let list = current === "all"
    ? products
    : products.filter(p => p.cat === current);

  grid.innerHTML = list.map(p => `
    <div class="card">
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
      <h3>${p.name}</h3>
      <p>₹${p.price}</p>
      <button onclick="add(${p.id})">Add to Cart</button>
    </div>
  `).join("");
}

function filter(c){
  current = c;
  render();
}

function add(id){
  let item = products.find(p => p.id === id);
  cart.push(item);

  document.getElementById("count").innerText = cart.length;
  document.getElementById("total").innerText =
    cart.reduce((s,i)=>s+i.price,0);
}

function checkout(){
  if(cart.length === 0){
    alert("Cart empty");
    return;
  }

  let msg = "Order:%0A";
  cart.forEach(i=>{
    msg += i.name + " - ₹" + i.price + "%0A";
  });

  window.open("https://wa.me/919999999999?text=" + encodeURIComponent(msg));
}

render();
</script>

</body>
</html>
