<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter Shop</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#fdf6ee;
}

header{
  text-align:center;
  padding:15px;
  background:white;
  font-weight:bold;
}

.container{
  padding:10px;
}

.products{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}

@media(max-width:600px){
  .products{
    grid-template-columns:1fr;
  }
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:cover;
  border-radius:8px;
}

.card button{
  width:100%;
  padding:12px;
  margin-top:8px;
  background:#712b13;
  color:white;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
}

.cart-bar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:white;
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<header>🧶 Mini Crochetter Shop</header>

<p id="status" style="text-align:center"></p>

<div class="container">
  <div id="products" class="products"></div>
</div>

<div class="cart-bar">
  <div>Total: ₹<span id="total">0</span></div>
  <button onclick="checkout()">Order</button>
</div>

<script src="products.js"></script>

<script>
let cart = [];

/* DEBUG CHECK */
document.getElementById("status").innerText =
typeof products !== "undefined"
? "Products loaded ✅"
: "Products NOT loading ❌";

/* render */
function render(){
  const box = document.getElementById("products");
  box.innerHTML = "";

  if(typeof products === "undefined"){
    box.innerHTML = "<p>products.js not loaded</p>";
    return;
  }

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'">
      <h4>${p.name}</h4>
      <p>₹${p.price}</p>
      <button>Add to Cart</button>
    `;

    div.querySelector("button").onclick = () => {
      cart.push(p);
      updateTotal();
    };

    box.appendChild(div);
  });
}

/* total */
function updateTotal(){
  let total = cart.reduce((s,i)=>s+i.price,0);
  document.getElementById("total").innerText = total;
}

/* checkout */
function checkout(){
  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  let msg = "🧶 Order:%0A";
  cart.forEach(i=>{
    msg += i.name + " - ₹" + i.price + "%0A";
  });

  let total = cart.reduce((s,i)=>s+i.price,0);
  msg += "%0ATotal: ₹" + total;

  window.open("https://wa.me/918886122232?text=" + msg);
}

/* start */
render();
updateTotal();
</script>

</body>
</html>
