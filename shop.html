<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Crochetter</title>

<style>
body { margin:0; font-family:Segoe UI; background:#fdf6ee; }

header {
  text-align:center;
  padding:15px;
  background:white;
  font-weight:bold;
  font-size:20px;
}

header div {
  font-size:12px;
  color:#555;
}

.container { padding:15px; }

.categories {
  display:flex;
  gap:10px;
  overflow-x:auto;
  margin-bottom:15px;
}

.categories button {
  padding:8px 12px;
  border:none;
  background:#eee;
  border-radius:20px;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
  object-position:center;
  border-radius:10px;
  cursor:pointer;
}

.card img:hover {
  transform: scale(1.05);
  transition: 0.3s;
}

.card p {
  font-size:13px;
  color:#555;
}

/* Popup */
#popup {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

#popup-box {
  background:white;
  padding:15px;
  border-radius:10px;
  width:90%;
  max-width:350px;
  text-align:center;
  position:relative;
}

#popup-box img {
  width:100%;
  border-radius:10px;
}

#close-popup {
  position:absolute;
  top:10px;
  right:15px;
  font-size:20px;
  cursor:pointer;
}
/* Enhance popup content */
#popup-name {
  margin:10px 0 5px;
}

#popup-desc {
  font-size:13px;
  color:#555;
  margin-bottom:5px;
}

#popup-price {
  font-weight:bold;
  margin-bottom:10px;
}

#popup-add {
  width:100%;
  padding:10px;
  background:#712b13;
  color:white;
  border:none;
  border-radius:5px;
}

/* smooth animation */
#popup-box {
  animation: popupFade 0.3s ease;
}

@keyframes popupFade {
  from {
    transform: scale(0.9);
    opacity:0;
  }
  to {
    transform: scale(1);
    opacity:1;
  }
}

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  function render(list){
    // your product code

  function updateTotal(){
    // total logic
  }

  // ✅ ADD THIS HERE (perfect spot)
  document.getElementById("popup").onclick = (e)=>{
    if(e.target.id === "popup"){
      document.getElementById("popup").style.display = "none";
    }
  };

  // other functions
  window.checkout = function(){ ... }
  window.filter = function(){ ... }

  render(products);
  updateTotal();

});
/* Cart */
.cart {
  position:fixed;
  bottom:0;
  width:100%;
  background:white;
  padding:10px;
  border-top:1px solid #ddd;
}
</style>
</head>

<body>

<header>
Mini Crochetter 🧶
<div>Pan India Shipping • Processing 5–7 days</div>
</header>

<div class="container">

<div class="categories">
  <button onclick="filter('all')">All</button>
  <button onclick="filter('flower')">Flowers</button>
  <button onclick="filter('plushie')">Plushies</button>
  <button onclick="filter('decor')">Decor</button>
  <button onclick="filter('bags')">Bags</button>
</div>

<div id="products" class="products"></div>

</div>

<div class="cart">
  ₹<span id="total">0</span>
  <button onclick="checkout()">Order</button>
</div>

<!-- POPUP -->
<div id="popup">
  <div id="popup-box">
    <span id="close-popup">&times;</span>
    <img id="popup-img">
    <h3 id="popup-name"></h3>
    <p id="popup-desc"></p>
    <p id="popup-price"></p>
    <button id="popup-add">Add to Cart</button>
  </div>
</div>

<script src="products.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(list){
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p=>{
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${p.img}">
      <h4>${p.name}</h4>
      <p>${p.desc}</p>
      <p><b>₹${p.price}</b></p>
      <button>Add to Cart</button>
    `;

    card.querySelector("img").onclick = ()=>{
      document.getElementById("popup").style.display = "flex";
      document.getElementById("popup-img").src = p.img;
      document.getElementById("popup-name").innerText = p.name;
      document.getElementById("popup-desc").innerText = p.desc;
      document.getElementById("popup-price").innerText = "₹" + p.price;

      document.getElementById("popup-add").onclick = ()=>{
        cart.push(p);
        localStorage.setItem("cart", JSON.stringify(cart));
        updateTotal();
      };
    };

    card.querySelector("button").onclick = ()=>{
      cart.push(p);
      localStorage.setItem("cart", JSON.stringify(cart));
      updateTotal();
    };

    container.appendChild(card);
  });
}

function updateTotal(){
  const total = cart.reduce((s,i)=>s+i.price,0);
  document.getElementById("total").innerText = total;
}

window.filter = function(cat){
  if(cat==="all") render(products);
  else render(products.filter(p=>p.category===cat));
}

window.checkout = function(){

  if(cart.length === 0){
    alert("Your cart is empty");
    return;
  }

  let msg="🧶 Mini Crochetter Order:%0A";

  cart.forEach(i=> msg += i.name+" ₹"+i.price+"%0A");

  const total = cart.reduce((s,i)=>s+i.price,0);

  msg += "%0ATotal: ₹"+total;
  msg += "%0A📦 Shipping included";
  msg += "%0A💳 UPI: 8886122232@yapl";

  window.open("https://wa.me/918886122232?text="+msg);
}

document.getElementById("close-popup").onclick = ()=>{
  document.getElementById("popup").style.display = "none";
};

render(products);
updateTotal();

});
</script>

</body>
</html>
