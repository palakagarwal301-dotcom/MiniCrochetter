<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link rel="stylesheet" href="style.css">

<style>
.box{
  max-width:600px;
  margin:30px auto;
  background:white;
  padding:15px;
  border-radius:12px;
}

img{
  width:100%;
  border-radius:10px;
  height:300px;
  object-fit:cover;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#712b13;
  color:white;
  border:none;
  border-radius:8px;
}
</style>

</head>

<body>

<div class="box">
  <img id="img">
  <h2 id="name"></h2>
  <p id="desc"></p>
  <h3 id="price"></h3>

  <button onclick="add()">Add to Cart</button>
</div>

<script>
let product = JSON.parse(localStorage.getItem("selectedProduct"));

document.getElementById("img").src = product.img;
document.getElementById("name").innerText = product.name;
document.getElementById("desc").innerText = product.desc;
document.getElementById("price").innerText = "₹" + product.price;

function add(){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({...product, qty:1});

  localStorage.setItem("cart", JSON.stringify(cart));

  alert("Added to cart!");
}
</script>

</body>
</html>
