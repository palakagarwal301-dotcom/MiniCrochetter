<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Success</title>

<link rel="stylesheet" href="style.css">

<style>
.box{
  max-width:500px;
  margin:80px auto;
  background:white;
  padding:30px;
  text-align:center;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

h1{
  color:#2e7d32;
  margin-bottom:10px;
}

p{
  color:#555;
  margin-bottom:20px;
}

button{
  padding:10px 15px;
  border:none;
  background:#712b13;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="box">
  <h1>🎉 Order Placed!</h1>
  <p>Thank you for shopping with Mini Crochetter 🧶</p>

  <p>We will contact you soon on WhatsApp.</p>

  <button onclick="goHome()">Continue Shopping</button>
</div>

<script>
localStorage.removeItem("cart");

function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
